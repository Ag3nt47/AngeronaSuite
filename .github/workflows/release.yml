name: Build & Release

# Tag a commit (e.g. v1.0.0) and push it to trigger a build + GitHub Release.
# The published .zip is a fully self-contained Windows build: the end user just
# unzips and double-clicks Angerona.exe. No Python, no venv, no pip -- so it is
# immune to the Microsoft Store "python.exe" stub that trips up source installs.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[windows]
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --noconfirm --clean --windowed `
            --name Angerona `
            --icon "assets/icons/angerona.ico" `
            --paths src `
            --collect-all PySide6 `
            --add-data "modules;modules" `
            --add-data "assets;assets" `
            --hidden-import angerona `
            src/angerona/__main__.py

      - name: Bundle runtime data next to the exe
        # yara_scanner.py looks for yara64.exe / rules.yar in the app folder at
        # runtime, so ship them alongside Angerona.exe (not buried in _internal).
        run: Copy-Item rules.yar, yara64.exe -Destination dist/Angerona/

      - name: Package portable zip
        run: Compress-Archive -Path dist/Angerona/* -DestinationPath Angerona-${{ github.ref_name }}-win64.zip

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Angerona-${{ github.ref_name }}-win64.zip
          generate_release_notes: true
