name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install audited dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade "pip==26.1.2"
          python -m pip install --only-binary :all: --build-constraint constraints-release.txt `
            -c constraints-release.txt ".[windows,voice]" `
            "PyInstaller==6.21.0" "cyclonedx-bom==7.3.0" "pytest==9.1.1"
          # Vosk's wheel is audited, but its upstream srt dependency is source-only.
          # Angerona ships the two-function compatibility surface Vosk actually uses.
          python tools/build_srt_compat_wheel.py --out build/vendor-wheels
          python -m pip install --only-binary :all: build/vendor-wheels/srt-0.0.0+angerona.1-py3-none-any.whl
          python -m pip install --only-binary :all: --no-deps "vosk==0.3.45"

      - name: Run release gates
        shell: pwsh
        run: |
          python -m compileall -q src tests
          python -m pytest -q

      - name: Bundle verified offline conversation model
        shell: pwsh
        run: |
          $bundleData = Join-Path (Resolve-Path ".") "build/bundled-runtime"
          New-Item -ItemType Directory -Force -Path $bundleData | Out-Null
          $env:ANGERONA_DATA = $bundleData
          python -c "from angerona.connectors.voice import install_offline_model; print(install_offline_model())"

      - name: Build one-file executables with embedded sidecar integrity
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --onefile `
            --name AngeronaBlackBox `
            --icon "assets/icons/blackbox.ico" `
            --distpath "dist/Angerona" `
            --workpath "build/AngeronaBlackBox" `
            --specpath "build" `
            --collect-all PySide6 `
            --collect-all psutil `
            --add-data "assets;assets" `
            blackbox_recorder.py

          $blackBox = Resolve-Path "dist/Angerona/AngeronaBlackBox.exe"
          $blackBoxHash = (Get-FileHash -Algorithm SHA256 $blackBox).Hash.ToLowerInvariant()
          @(
            '"""Generated by the release workflow; do not edit in an artifact."""'
            ''
            "BLACKBOX_SHA256 = `"$blackBoxHash`""
          ) | Set-Content -Encoding utf8 "src/angerona/_release_integrity.py"

          pyinstaller --noconfirm --clean --windowed --onefile `
            --name Angerona `
            --icon "assets/icons/angerona.ico" `
            --distpath "dist/Angerona" `
            --workpath "build/AngeronaMain" `
            --specpath "build" `
            --paths src `
            --collect-all PySide6 `
            --collect-all yara_x `
            --collect-all vosk `
            --collect-all sounddevice `
            --collect-submodules angerona.modules `
            --collect-submodules angerona.resilience `
            --add-data "modules;modules" `
            --add-data "assets;assets" `
            --add-data "rules.yar;." `
            --add-data "build/bundled-runtime/models;runtime-data/models" `
            --hidden-import angerona `
            src/angerona/__main__.py

      - name: Verify frozen application contents
        shell: pwsh
        run: |
          $listing = (& pyi-archive_viewer --recursive "dist/Angerona/Angerona.exe" | Out-String)
          if ($listing -notmatch 'angerona\.modules\.purple_guard') {
            throw 'Frozen archive is missing dynamically discovered Angerona modules.'
          }
          if ($listing -notmatch 'angerona\._release_integrity') {
            throw 'Frozen archive is missing its embedded Black Box digest.'
          }
          if (-not (Test-Path "dist/Angerona/AngeronaBlackBox.exe")) {
            throw 'Frozen Black Box sidecar was not created.'
          }

      - name: Bundle release installer and documentation
        shell: pwsh
        run: |
          Copy-Item README.md, LICENSE, Install-Angerona-Release.bat, Install-Angerona-Release.ps1 -Destination dist/Angerona/
          if (Test-Path SECURITY.md) { Copy-Item SECURITY.md -Destination dist/Angerona/ }
          if (Test-Path docs) { Copy-Item docs -Destination dist/Angerona/docs -Recurse }
          if (Test-Path playbooks) { Copy-Item playbooks -Destination dist/Angerona/playbooks -Recurse }

          $releaseFiles = @('Angerona.exe', 'AngeronaBlackBox.exe')
          $manifest = foreach ($name in $releaseFiles) {
            $hash = (Get-FileHash -Algorithm SHA256 (Join-Path 'dist/Angerona' $name)).Hash.ToLowerInvariant()
            "$hash  $name"
          }
          $manifest | Set-Content -Encoding ascii "dist/Angerona/release-files.sha256"

      - name: Create SBOM, package, and checksum
        shell: pwsh
        run: |
          cyclonedx-py environment --output-format JSON --output-file Angerona-SBOM.json
          $zip = "Angerona-${{ github.ref_name }}-win64.zip"
          Compress-Archive -Path dist/Angerona/* -DestinationPath $zip
          (Get-FileHash -Algorithm SHA256 $zip).Hash.ToLower() + "  " + $zip |
            Set-Content -Encoding ascii "$zip.sha256"

      - name: Upload gated release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: angerona-release-assets
          if-no-files-found: error
          path: |
            Angerona-${{ github.ref_name }}-win64.zip
            Angerona-${{ github.ref_name }}-win64.zip.sha256
            Angerona-SBOM.json

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download gated assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: angerona-release-assets

      - name: Attest release archive
        uses: actions/attest-build-provenance@78e6cbd37d0ac1a40113c04f2037dacf1ea3f12e # v4
        with:
          subject-path: Angerona-${{ github.ref_name }}-win64.zip

      - name: Attest software bill of materials
        uses: actions/attest-sbom@51e74621a501c89df81fc1391c5a8f4cfc9fab2f # v3
        with:
          subject-path: Angerona-${{ github.ref_name }}-win64.zip
          sbom-path: Angerona-SBOM.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: |
            Angerona-${{ github.ref_name }}-win64.zip
            Angerona-${{ github.ref_name }}-win64.zip.sha256
            Angerona-SBOM.json
          generate_release_notes: true
